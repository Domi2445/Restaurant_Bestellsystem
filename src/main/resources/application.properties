spring.application.name=Bestellsystem

# H2 für lokale Entwicklung
spring.datasource.url=jdbc:h2:mem:bestellsystem;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2-Console aktivieren
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=BestellsystemSecretKeyForJWTTokenGenerationPleaseChangeInProductionEnvironment12345
app.jwt.expiration=86400000
app.jwt.access-expiration=900000
app.jwt.refresh-expiration=1209600000

# CORS
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:8080
