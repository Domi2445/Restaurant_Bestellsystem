spring.application.name=Bestellsystem

# PostgreSQL für Produktion
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/bestellsystem}
spring.datasource.username=${DB_USERNAME:bestellsystem}
spring.datasource.password=${DB_PASSWORD:bestellsystem}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL10Dialect

