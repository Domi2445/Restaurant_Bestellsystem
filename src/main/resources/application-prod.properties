spring.application.name=Bestellsystem

# PostgreSQL für Produktion
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/bestellsystem}
spring.datasource.username=${DB_USERNAME:bestellsystem}
spring.datasource.password=${DB_PASSWORD:bestellsystem}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT
app.jwt.secret=${JWT_SECRET:PleaseSetARealSecretInProductionAtLeast32CharactersLong1234567890}
app.jwt.access-expiration=${JWT_ACCESS_EXPIRATION:900000}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:1209600000}

